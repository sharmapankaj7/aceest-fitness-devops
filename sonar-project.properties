# ---------------------------------------------------------------------------
# SonarCloud Configuration — ACEest Fitness & Gym
# ---------------------------------------------------------------------------
# Used by SonarScanner (CLI or Jenkins plugin) to analyse this project.
# Connects to SonarCloud (https://sonarcloud.io) — the hosted SonarQube.
# ---------------------------------------------------------------------------

# ── Project identification ──────────────────────────────────────────────────
sonar.projectKey=sharmapankaj7_aceest-fitness-devops
sonar.organization=sharmapankaj7
sonar.projectName=ACEest Fitness & Gym
sonar.projectVersion=3.2.4

# ── SonarCloud host ────────────────────────────────────────────────────────
sonar.host.url=https://sonarcloud.io

# ── Source configuration ────────────────────────────────────────────────────
sonar.sources=.
sonar.inclusions=app.py
sonar.tests=.
sonar.test.inclusions=test_app.py
sonar.language=py
sonar.python.version=3.12

# ── Exclusions ──────────────────────────────────────────────────────────────
sonar.exclusions=venv/**,__pycache__/**,.git/**,k8s/**

# ── Encoding ────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
