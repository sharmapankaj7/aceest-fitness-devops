# ---------------------------------------------------------------------------
# GitHub Actions CI/CD Pipeline — ACEest Fitness & Gym
# ---------------------------------------------------------------------------
# Triggered on every push and pull_request to main.
# Stages:
#   1. Build & Lint   — install deps, flake8 syntax check
#   2. Unit Tests     — run Pytest suite
#   3. Docker Build   — build & verify the Docker image
#   4. Container Test — run Pytest inside the Docker container
# ---------------------------------------------------------------------------

name: ACEest CI/CD Pipeline

on:
  push:
    branches: ["main", "develop", "feature/*"]
  pull_request:
    branches: ["main"]

jobs:
  # =======================================================================
  # Stage 1 — Build & Lint
  # =======================================================================
  build-and-lint:
    name: "Build & Lint"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat all other warnings as non-blocking (exit-zero)
          flake8 app.py --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Verify application imports
        run: python -c "from app import app; print('✅ Application imports successfully')"

  # =======================================================================
  # Stage 2 — Unit Tests
  # =======================================================================
  test:
    name: "Automated Testing (Pytest)"
    runs-on: ubuntu-latest
    needs: build-and-lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest suite
        run: pytest test_app.py -v --tb=short

  # =======================================================================
  # Stage 3 — Docker Image Assembly
  # =======================================================================
  docker-build:
    name: "Docker Image Assembly"
    runs-on: ubuntu-latest
    needs: build-and-lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aceest-fitness:latest .

      - name: Verify Docker image exists
        run: docker images aceest-fitness:latest

  # =======================================================================
  # Stage 4 — Containerized Testing
  # =======================================================================
  container-test:
    name: "Containerized Pytest"
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aceest-fitness:test .

      - name: Run Pytest inside container
        run: |
          docker run --rm aceest-fitness:test \
            python -m pytest test_app.py -v --tb=short

  # =======================================================================
  # Stage 5 — Push Docker Image to Docker Hub
  # =======================================================================
  docker-push:
    name: "Push to Docker Hub"
    runs-on: ubuntu-latest
    needs: [test, container-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from app.py
        id: version
        run: |
          VERSION=$(python -c "import re; m=re.search(r'\"version\":\s*\"(.+?)\"', open('app.py').read()); print(m.group(1))")
          echo "APP_VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Build and tag Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/aceest-fitness:latest .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/aceest-fitness:latest \
            ${{ secrets.DOCKERHUB_USERNAME }}/aceest-fitness:v${{ steps.version.outputs.APP_VERSION }}
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/aceest-fitness:latest \
            ${{ secrets.DOCKERHUB_USERNAME }}/aceest-fitness:build-${{ github.run_number }}

      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/aceest-fitness:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/aceest-fitness:v${{ steps.version.outputs.APP_VERSION }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/aceest-fitness:build-${{ github.run_number }}
