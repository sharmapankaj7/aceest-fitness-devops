# ---------------------------------------------------------------------------
# A/B Testing — Version A (Control Group)
# ---------------------------------------------------------------------------
# Serves the current version. Traffic routing is controlled by the Ingress
# using header-based rules: users with header "X-Version: B" go to version B,
# all other users go to version A (this deployment).
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-version-a
  namespace: aceest-fitness
  labels:
    app: aceest-fitness
    variant: a
    strategy: ab-testing
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aceest-fitness
      variant: a
  template:
    metadata:
      labels:
        app: aceest-fitness
        variant: a
        version: v3.2.4
    spec:
      containers:
        - name: aceest-fitness
          image: sharmapankaj7/aceest-fitness:v3.2.4
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
