# ---------------------------------------------------------------------------
# A/B Testing — Version B (Experiment Group)
# ---------------------------------------------------------------------------
# Serves the new version. Only users with header "X-Version: B" are routed
# here via the NGINX Ingress annotation.
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-version-b
  namespace: aceest-fitness
  labels:
    app: aceest-fitness
    variant: b
    strategy: ab-testing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      variant: b
  template:
    metadata:
      labels:
        app: aceest-fitness
        variant: b
        version: v4.0.0
    spec:
      containers:
        - name: aceest-fitness
          image: sharmapankaj7/aceest-fitness:v4.0.0
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
