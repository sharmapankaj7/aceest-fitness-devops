# ---------------------------------------------------------------------------
# A/B Testing — Services for Version A and Version B
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: aceest-version-a-svc
  namespace: aceest-fitness
  labels:
    strategy: ab-testing
    variant: a
spec:
  type: ClusterIP
  selector:
    app: aceest-fitness
    variant: a
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-version-b-svc
  namespace: aceest-fitness
  labels:
    strategy: ab-testing
    variant: b
spec:
  type: ClusterIP
  selector:
    app: aceest-fitness
    variant: b
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
