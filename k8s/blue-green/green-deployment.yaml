# ---------------------------------------------------------------------------
# Blue-Green Deployment — GREEN (New Version)
# ---------------------------------------------------------------------------
# The "green" environment runs the new version being validated.
# Once verified, switch the Service selector from slot=blue to slot=green.
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-green
  namespace: aceest-fitness
  labels:
    app: aceest-fitness
    slot: green
    strategy: blue-green
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aceest-fitness
      slot: green
  template:
    metadata:
      labels:
        app: aceest-fitness
        slot: green
        version: v4.0.0
    spec:
      containers:
        - name: aceest-fitness
          image: sharmapankaj7/aceest-fitness:v4.0.0
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
