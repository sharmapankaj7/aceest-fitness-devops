# ---------------------------------------------------------------------------
# Rolling Update Strategy
# ---------------------------------------------------------------------------
# Default Kubernetes strategy. Updates pods incrementally — at most 1 pod
# unavailable and 1 extra pod created at a time during the rollout.
#
# Deploy:   kubectl apply -f k8s/rolling-update/deployment.yaml
# Monitor:  kubectl rollout status deployment/aceest-rolling -n aceest-fitness
# Rollback: kubectl rollout undo deployment/aceest-rolling -n aceest-fitness
# History:  kubectl rollout history deployment/aceest-rolling -n aceest-fitness
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-rolling
  namespace: aceest-fitness
  labels:
    app: aceest-fitness
    strategy: rolling-update
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: aceest-fitness
      strategy: rolling-update
  template:
    metadata:
      labels:
        app: aceest-fitness
        strategy: rolling-update
        version: v3.2.4
    spec:
      containers:
        - name: aceest-fitness
          image: sharmapankaj7/aceest-fitness:v3.2.4
          ports:
            - containerPort: 5000
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-rolling-svc
  namespace: aceest-fitness
  labels:
    strategy: rolling-update
spec:
  type: NodePort
  selector:
    app: aceest-fitness
    strategy: rolling-update
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30081
