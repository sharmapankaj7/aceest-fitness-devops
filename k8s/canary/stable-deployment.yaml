# ---------------------------------------------------------------------------
# Canary Deployment — Stable (majority traffic)
# ---------------------------------------------------------------------------
# Runs 4 replicas of the stable version. Combined with 1 canary replica,
# ~80% of traffic goes to stable, ~20% to canary (ratio-based routing).
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-stable
  namespace: aceest-fitness
  labels:
    app: aceest-fitness
    track: stable
    strategy: canary
spec:
  replicas: 4
  selector:
    matchLabels:
      app: aceest-fitness
      track: stable
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: stable
        version: v3.2.4
    spec:
      containers:
        - name: aceest-fitness
          image: sharmapankaj7/aceest-fitness:v3.2.4
          ports:
            - containerPort: 5000
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
