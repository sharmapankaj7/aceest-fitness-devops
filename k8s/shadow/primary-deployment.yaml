# ---------------------------------------------------------------------------
# Shadow Deployment — Primary (serves real traffic)
# ---------------------------------------------------------------------------
# The primary deployment handles all production traffic.
# The shadow deployment receives a mirrored copy of traffic for testing
# but its responses are discarded — users never see shadow responses.
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-primary
  namespace: aceest-fitness
  labels:
    app: aceest-fitness
    role: primary
    strategy: shadow
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aceest-fitness
      role: primary
  template:
    metadata:
      labels:
        app: aceest-fitness
        role: primary
        version: v3.2.4
    spec:
      containers:
        - name: aceest-fitness
          image: sharmapankaj7/aceest-fitness:v3.2.4
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-primary-svc
  namespace: aceest-fitness
  labels:
    role: primary
    strategy: shadow
spec:
  type: NodePort
  selector:
    app: aceest-fitness
    role: primary
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30084
